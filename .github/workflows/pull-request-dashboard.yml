name: Pull request dashboard

on:
  schedule:
    # hourly
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to refresh. Empty means full rebuild.
        required: false
        type: string
      trigger_event:
        description: Event that requested the refresh.
        required: false
        type: string
      trigger_action:
        description: Event action that requested the refresh.
        required: false
        type: string
      trigger_actor:
        description: Actor that requested the refresh.
        required: false
        type: string
      trigger_review_id:
        description: Pull request review id that requested the refresh.
        required: false
        type: string

permissions:
  contents: read

env:
  DASHBOARD_STATE_BRANCH: otelbot/pull-request-dashboard-state

jobs:
  resolve-trigger:
    if: github.repository == 'open-telemetry/semantic-conventions-genai'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      skip_dashboard: ${{ steps.trigger.outputs.skip_dashboard }}
      pr_number: ${{ steps.trigger.outputs.pr_number }}
      trigger_event: ${{ steps.trigger.outputs.event }}
      trigger_action: ${{ steps.trigger.outputs.action }}
      trigger_actor: ${{ steps.trigger.outputs.actor }}
      trigger_review_id: ${{ steps.trigger.outputs.review_id }}
    steps:
      - name: Resolve trigger
        id: trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_FROM_INPUT: ${{ inputs.pr_number }}
          TRIGGER_EVENT_FROM_INPUT: ${{ inputs.trigger_event }}
          TRIGGER_ACTION_FROM_INPUT: ${{ inputs.trigger_action }}
          TRIGGER_ACTOR_FROM_INPUT: ${{ inputs.trigger_actor }}
          TRIGGER_REVIEW_ID_FROM_INPUT: ${{ inputs.trigger_review_id }}
        run: |
          set -euo pipefail
          pr_number=""
          trigger_event=""
          trigger_action=""
          trigger_actor=""
          trigger_review_id=""
          skip_dashboard="false"

          skip_event() {
            echo "$1" >&2
            skip_dashboard="true"
            trigger_event=""
            trigger_action=""
            trigger_actor=""
            trigger_review_id=""
          }

          case "$EVENT_NAME" in
            schedule)
              trigger_event="$EVENT_NAME"
              ;;
            workflow_dispatch)
              pr_number="$PR_FROM_INPUT"
              trigger_event="${TRIGGER_EVENT_FROM_INPUT:-workflow_dispatch}"
              trigger_action="$TRIGGER_ACTION_FROM_INPUT"
              trigger_actor="$TRIGGER_ACTOR_FROM_INPUT"
              trigger_review_id="$TRIGGER_REVIEW_ID_FROM_INPUT"
              ;;
          esac

          # Re-validate bridge inputs before using them to select a targeted
          # dashboard update.
          if [[ -n "$pr_number" ]]; then
            [[ "$pr_number" =~ ^[1-9][0-9]{0,6}$ ]] \
              || { echo "bad PR number: $pr_number"; exit 1; }
          fi
          if [[ -n "$trigger_event" ]]; then
            [[ "$trigger_event" =~ ^(schedule|workflow_dispatch|check_suite|pull_request|issue_comment|pull_request_review|pull_request_review_comment|pull_request_review_thread)$ ]] \
              || { skip_event "bad trigger event: $trigger_event"; }
          fi
          if [[ -n "$trigger_action" ]]; then
            [[ "$trigger_action" =~ ^[a-z_]{1,32}$ ]] \
              || { skip_event "bad trigger action: $trigger_action"; }
          fi
          if [[ -n "$trigger_actor" ]]; then
            [[ "$trigger_actor" =~ ^[A-Za-z0-9_.-]{1,100}(\[bot\])?$ ]] \
              || { skip_event "bad trigger actor: $trigger_actor"; }
          fi
          if [[ -n "$trigger_review_id" ]]; then
            [[ "$trigger_review_id" =~ ^[1-9][0-9]{0,19}$ ]] \
              || { skip_event "bad trigger review id: $trigger_review_id"; }
          fi

          {
            echo "skip_dashboard=$skip_dashboard"
            echo "pr_number=$pr_number"
            echo "event=$trigger_event"
            echo "action=$trigger_action"
            echo "actor=$trigger_actor"
            echo "review_id=$trigger_review_id"
          } >> "$GITHUB_OUTPUT"

          # Echo the resolved trigger to the job log for at-a-glance diagnostics.
          echo "trigger: pr=${pr_number:--} event=${trigger_event:--} action=${trigger_action:--} actor=${trigger_actor:--} review=${trigger_review_id:--}"

  update-dashboard:
    needs: resolve-trigger
    if: needs.resolve-trigger.outputs.skip_dashboard != 'true'
    # Same-PR events are serialized together while unrelated PRs can update
    # state concurrently. Full rebuilds use their own lane. The state branch
    # push below still uses --force-with-lease as the durable CAS across lanes.
    concurrency:
      group: ${{ github.workflow }}-state-${{ github.repository }}-${{ needs.resolve-trigger.outputs.pr_number || 'full' }}
      cancel-in-progress: false
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: read
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Post Copilot review guidance
        if: >-
          needs.resolve-trigger.outputs.pr_number != '' &&
          needs.resolve-trigger.outputs.trigger_event == 'pull_request_review' &&
          needs.resolve-trigger.outputs.trigger_action == 'submitted' &&
          needs.resolve-trigger.outputs.trigger_actor == 'copilot-pull-request-reviewer[bot]' &&
          needs.resolve-trigger.outputs.trigger_review_id != ''
        env:
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve-trigger.outputs.pr_number }}
          REVIEW_ID: ${{ needs.resolve-trigger.outputs.trigger_review_id }}
          REPO: ${{ github.repository }}
          # Hidden HTML marker used to detect whether the guidance comment
          # has already been posted on this PR.
          MARKER: <!-- copilot-review-guidance -->
        run: |
          set -euo pipefail

          review_comment_count=$(gh api \
            --paginate \
            "repos/${REPO}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/comments" \
            --jq '.[].id' \
            | wc -l \
            | tr -d ' ')
          if [[ "$review_comment_count" == "0" ]]; then
            echo "Copilot review ${REVIEW_ID} has no review comments; skipping guidance comment."
            exit 0
          fi

          if gh api \
            --paginate \
            "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("'"${MARKER}"'")) | .id' \
            | grep -q .; then
            echo "Guidance comment already posted on PR #${PR_NUMBER}; skipping."
            exit 0
          fi

          body=$(cat <<EOF
          ${MARKER}
          Copilot has reviewed this PR. Copilot's suggestions aren't always correct or applicable, so please evaluate each comment on its merits and then handle it in one of these ways:

          - click GitHub's "Apply suggestion" button (auto-resolves the thread);
          - reply that it was **applied** (ideally linking to the commit); or
          - reply that it was **not applied**, with the reason.

          Approvers rely on automation that flags a PR for human review once every Copilot comment has been replied to or marked as resolved, so keeping these threads up to date is what tells reviewers the PR is ready for another look.

          Status across open PRs is visible on the [pull request dashboard](https://github.com/open-telemetry/semantic-conventions-genai/issues/102).
          EOF
          )

          gh api \
            --method POST \
            "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="${body}"

      - name: Restore per-PR classification cache
        # Scoped to one PR so concurrent PR events don't overwrite each
        # other's work. Cache entries are immutable, so the save key uses
        # a rolling suffix and restore-keys picks the most recent snapshot.
        if: needs.resolve-trigger.outputs.pr_number != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/classifications
          key: pull-request-dashboard-classifications-${{ needs.resolve-trigger.outputs.pr_number }}-${{ github.run_id }}
          restore-keys: |
            pull-request-dashboard-classifications-${{ needs.resolve-trigger.outputs.pr_number }}-

      - name: Restore shared full-rebuild classification cache
        # Single cache shared across the hourly schedule and manual full
        # rebuilds, so only the few PRs that changed since the last
        # rebuild pay the LLM cost. Same rolling-key pattern as above.
        if: needs.resolve-trigger.outputs.pr_number == ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/classifications
          key: pull-request-dashboard-classifications-all-${{ github.run_id }}
          restore-keys: |
            pull-request-dashboard-classifications-all-

      - name: Install Copilot CLI
        run: |
          npm ci --prefix .github/scripts/copilot-cli
          # expose the locally-installed `copilot` binary to subsequent steps
          echo "$GITHUB_WORKSPACE/.github/scripts/copilot-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Generate and update dashboard
        env:
          TRIGGER_PR_NUMBER: ${{ needs.resolve-trigger.outputs.pr_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # needed for reading approver team membership (org:read)
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dashboard_args=(--state-branch "$DASHBOARD_STATE_BRANCH")
          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            dashboard_args+=(--pr-number "$TRIGGER_PR_NUMBER")
          fi

          python3 .github/scripts/pull-request-dashboard/dashboard.py "${dashboard_args[@]}"

  notify-slack:
    needs: update-dashboard
    if: needs.update-dashboard.result == 'success'
    # Slack sends are external side effects, so serialize notification
    # processing while still allowing PR-specific dashboard computation to run
    # concurrently. The notification ledger is pushed with the same state-branch
    # CAS retry loop used by dashboard updates.
    concurrency:
      group: ${{ github.workflow }}-notify-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Send Slack notifications
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_MAP_JSON: ${{ secrets.SLACK_USER_MAP_JSON }}
        run: |
          set -euo pipefail
          python3 .github/scripts/pull-request-dashboard/notify_slack.py \
            --state-branch "$DASHBOARD_STATE_BRANCH"

  publish-dashboard:
    needs: update-dashboard
    if: needs.update-dashboard.result == 'success'
    # The issue body is a single shared projection. Serialize publication,
    # then fetch the latest accepted state branch while holding this slot so
    # an older run cannot publish stale markdown after a newer state update
    # has landed.
    concurrency:
      group: ${{ github.workflow }}-publish-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Publish dashboard issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/pull-request-dashboard/publish_dashboard.py \
            --state-branch "$DASHBOARD_STATE_BRANCH"
